<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PassForge — Password Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0f0f1a;
  --card: #16162a;
  --border: #2a2a4a;
  --purple: #7c3aed;
  --purple-light: #a855f7;
  --pink: #ec4899;
  --cyan: #06b6d4;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Space Grotesk', sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  padding:20px;
  background-image: radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.15) 0%, transparent 50%),
                    radial-gradient(ellipse at 80% 80%, rgba(6,182,212,0.1) 0%, transparent 50%);
}
.container { width:100%; max-width:520px; }
.header { text-align:center; margin-bottom:32px; }
.header h1 {
  font-size:2rem; font-weight:700;
  background:linear-gradient(135deg, var(--purple-light), var(--cyan));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  margin-bottom:6px;
}
.header p { color:var(--text-dim); font-size:0.85rem; }

.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:28px;
  margin-bottom:16px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

/* Output */
.output-wrap { position:relative; margin-bottom:8px; }
.password-output {
  width:100%; padding:16px 50px 16px 16px;
  background:#0a0a14; border:1px solid var(--border);
  color:var(--cyan); font-family:'Fira Code',monospace;
  font-size:0.95rem; border-radius:12px;
  outline:none; letter-spacing:1px;
  transition:border-color 0.2s;
}
.password-output:focus { border-color:var(--purple); }
.copy-btn {
  position:absolute; right:10px; top:50%; transform:translateY(-50%);
  background:transparent; border:none; color:var(--text-dim);
  font-size:1.1rem; cursor:pointer; padding:4px;
  transition:color 0.2s;
}
.copy-btn:hover { color:var(--purple-light); }

/* Strength */
.strength-row { display:flex; gap:4px; margin-bottom:20px; }
.strength-seg { flex:1; height:4px; border-radius:100px; background:var(--border); transition:background 0.3s; }

/* Slider */
.slider-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.slider-label { font-size:0.8rem; color:var(--text-dim); }
.slider-val { font-family:'Fira Code',monospace; font-size:0.9rem; color:var(--purple-light); font-weight:500; }
input[type=range] {
  width:100%; accent-color:var(--purple);
  margin-bottom:20px; cursor:pointer;
}

/* Checkboxes */
.options-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
.option-item {
  display:flex; align-items:center; gap:10px;
  padding:12px; background:#0a0a14;
  border:1px solid var(--border); border-radius:10px;
  cursor:pointer; transition:all 0.2s;
}
.option-item:hover { border-color:var(--purple); }
.option-item input { accent-color:var(--purple); width:16px; height:16px; cursor:pointer; }
.option-item label { font-size:0.8rem; color:var(--text-dim); cursor:pointer; }

/* Generate btn */
.gen-btn {
  width:100%; padding:14px;
  background:linear-gradient(135deg, var(--purple), var(--purple-light));
  border:none; color:#fff;
  font-family:'Space Grotesk',sans-serif; font-size:0.9rem; font-weight:600;
  border-radius:12px; cursor:pointer;
  transition:all 0.3s; letter-spacing:0.5px;
  box-shadow:0 4px 20px rgba(124,58,237,0.4);
}
.gen-btn:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(124,58,237,0.5); }
.gen-btn:active { transform:translateY(0); }

/* History */
.history-title { font-size:0.75rem; color:var(--text-dim); letter-spacing:1px; text-transform:uppercase; margin-bottom:12px; }
.history-list { display:flex; flex-direction:column; gap:8px; max-height:180px; overflow-y:auto; }
.history-list::-webkit-scrollbar { width:3px; }
.history-list::-webkit-scrollbar-thumb { background:var(--border); }
.history-item {
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 14px; background:#0a0a14;
  border:1px solid var(--border); border-radius:8px;
  font-family:'Fira Code',monospace; font-size:0.78rem; color:var(--text-dim);
}
.history-copy { background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:0.8rem; transition:color 0.2s; }
.history-copy:hover { color:var(--cyan); }

.toast {
  position:fixed; bottom:20px; right:20px;
  background:var(--purple); color:#fff;
  padding:10px 20px; border-radius:100px;
  font-size:0.8rem; font-weight:500;
  opacity:0; transform:translateY(10px);
  transition:all 0.3s; pointer-events:none;
}
.toast.show { opacity:1; transform:translateY(0); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🔐 PassForge</h1>
    <p>Generate ultra-secure passwords instantly</p>
  </div>

  <div class="card">
    <div class="output-wrap">
      <input type="text" class="password-output" id="pwOutput" readonly placeholder="Click Generate..."/>
      <button class="copy-btn" onclick="copyPw()" title="Copy">📋</button>
    </div>
    <div class="strength-row" id="strengthRow">
      <div class="strength-seg" id="s1"></div>
      <div class="strength-seg" id="s2"></div>
      <div class="strength-seg" id="s3"></div>
      <div class="strength-seg" id="s4"></div>
    </div>

    <div class="slider-row">
      <span class="slider-label">Password Length</span>
      <span class="slider-val" id="lenVal">16</span>
    </div>
    <input type="range" id="lenSlider" min="6" max="64" value="16" oninput="updateLen()"/>

    <div class="options-grid">
      <div class="option-item">
        <input type="checkbox" id="opt-upper" checked/>
        <label for="opt-upper">Uppercase (A-Z)</label>
      </div>
      <div class="option-item">
        <input type="checkbox" id="opt-lower" checked/>
        <label for="opt-lower">Lowercase (a-z)</label>
      </div>
      <div class="option-item">
        <input type="checkbox" id="opt-num" checked/>
        <label for="opt-num">Numbers (0-9)</label>
      </div>
      <div class="option-item">
        <input type="checkbox" id="opt-sym" checked/>
        <label for="opt-sym">Symbols (!@#$)</label>
      </div>
    </div>

    <button class="gen-btn" onclick="generate()">⚡ Generate Password</button>
  </div>

  <div class="card">
    <div class="history-title">Recent Passwords</div>
    <div class="history-list" id="historyList">
      <div style="color:#4a5568;font-size:0.78rem;text-align:center;padding:12px">No passwords generated yet</div>
    </div>
  </div>
</div>
<div class="toast" id="toast">✅ Copied to clipboard!</div>

<script>
const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const lower = 'abcdefghijklmnopqrstuvwxyz';
const nums  = '0123456789';
const syms  = '!@#$%^&*()_+-=[]{}|;:,.<>?';
let history = [];

function updateLen() {
  document.getElementById('lenVal').textContent = document.getElementById('lenSlider').value;
}

function generate() {
  let charset = '';
  if (document.getElementById('opt-upper').checked) charset += upper;
  if (document.getElementById('opt-lower').checked) charset += lower;
  if (document.getElementById('opt-num').checked)   charset += nums;
  if (document.getElementById('opt-sym').checked)   charset += syms;
  if (!charset) { alert('Select at least one option!'); return; }

  const len = parseInt(document.getElementById('lenSlider').value);
  let pw = '';
  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  for (let i = 0; i < len; i++) pw += charset[arr[i] % charset.length];

  document.getElementById('pwOutput').value = pw;
  updateStrength(pw);
  addHistory(pw);
}

function updateStrength(pw) {
  let score = 0;
  if (pw.length >= 8)  score++;
  if (pw.length >= 16) score++;
  if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
  if (/[0-9]/.test(pw) && /[^a-zA-Z0-9]/.test(pw)) score++;

  const colors = ['#ef4444','#f97316','#eab308','#22c55e'];
  const segs = ['s1','s2','s3','s4'];
  segs.forEach((id, i) => {
    document.getElementById(id).style.background = i < score ? colors[score-1] : 'var(--border)';
  });
}

function addHistory(pw) {
  history.unshift(pw);
  if (history.length > 5) history.pop();
  const list = document.getElementById('historyList');
  list.innerHTML = history.map(p => `
    <div class="history-item">
      <span>${p.substring(0,28)}${p.length > 28 ? '...' : ''}</span>
      <button class="history-copy" onclick="copyText('${p}')">copy</button>
    </div>`).join('');
}

function copyPw() { copyText(document.getElementById('pwOutput').value); }
function copyText(text) {
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  });
}

generate();
</script>
</body>
</html>
